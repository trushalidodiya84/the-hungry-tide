<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>The Hungry Tide - Literary Cartography</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css">

<script src="https://cdn.jsdelivr.net/npm/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>
<style>
#map{
    height:95vh;
}
</style>
/* Tree Layer Styling */

.leaflet-layerstree-closed:before {
    content: "▶ ";
    font-size: 12px;
}

.leaflet-layerstree-opened:before {
    content: "▼ ";
    font-size: 12px;
}
</head>
<body>

<h3>The Hungry Tide – Literary Cartography</h3>

<div id="map"></div>

<script>

/* ================= BASE MAP ================= */

var map = L.map('map').setView([22.0,89.0],6);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
 attribution:'© OpenStreetMap © CARTO'
}
).addTo(map);

/* ================= MAIN THEMATIC LAYERS ================= */

/* Ecology = Green */
/* ================= ECOLOGICAL HABITAT NETWORKS ================= */

var ecologyLayer = L.layerGroup().addTo(map);

/* Sub Layers */

var dolphinLayer = L.layerGroup();

var tigerLayer = L.layerGroup();

var mangroveLayer = L.layerGroup();

var tidalPoolLayer = L.layerGroup();

var ecologicalCorridorLayer = L.layerGroup();

var stormLayer = L.layerGroup();
    

/* Migration = Red */
var migrationLayer = L.layerGroup().addTo(map);

/* Memory = Blue */
var memoryLayer = L.layerGroup().addTo(map);

/* ================= ECOLOGY SUBLAYERS ================= */

ecologyLayer.addLayer(dolphinLayer);

ecologyLayer.addLayer(tigerLayer);

ecologyLayer.addLayer(mangroveLayer);

ecologyLayer.addLayer(tidalPoolLayer);

ecologyLayer.addLayer(ecologicalCorridorLayer);

ecologyLayer.addLayer(stormLayer);
var overlaysTree = {

  label: "Thematic Layers",

  children: [

    {
      label: "🟢 Ecological Habitat Networks",
      children: [

        { label: "🐬 Dolphin Habitats", layer: dolphinLayer },

        { label: "🐯 Tiger Habitats", layer: tigerLayer },

        { label: "🌿 Mangrove Zones", layer: mangroveLayer },

        { label: "🌊 Tidal Pools", layer: tidalPoolLayer },

        { label: "🔄 Ecological Corridors", layer: ecologicalCorridorLayer },

        { label: "⛈ Storm Affected Regions", layer: stormLayer }

      ]
    },

    {
      label: "🔴 Migration & Mobility Networks",
      children: [

        { label: "Character Routes", layer: migrationLayer }

      ]
    },

    {
      label: "🔵 Spatial & Cultural Memory",
      children: [

        { label: "Memory Sites", layer: memoryLayer }

      ]
    }

  ]
};

L.control.layers.tree(
    null,
    overlaysTree,
    {
        collapsed:false
    }
).addTo(map);

</script>

</body>
</html>
