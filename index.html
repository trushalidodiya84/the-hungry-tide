<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>The Hungry Tide - Literary Cartography</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
    height:95vh;
}
</style>

</head>
<body>

<h3>The Hungry Tide – Literary Cartography</h3>

<div id="map"></div>

<script>

/* ================= BASE MAP ================= */

var map = L.map('map').setView([22.0,89.0],6);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
 attribution:'© OpenStreetMap © CARTO'
}
).addTo(map);


/* ================= MAIN THEMATIC LAYERS ================= */

/* Ecology = Green */
var ecologyLayer = L.featureGroup().addTo(map);

/* Migration = Red */
var migrationLayer = L.featureGroup().addTo(map);

/* Memory = Blue */
var memoryLayer = L.featureGroup().addTo(map);


/* ================= LAYER CONTROL ================= */

L.control.layers(
null,
{
    "🟢 Ecological Habitat Networks": ecologyLayer,
    "🔴 Migration & Mobility Networks": migrationLayer,
    "🔵 Spatial & Cultural Memory": memoryLayer
},
{
    collapsed:false
}
).addTo(map);

</script>

</body>
</html>
