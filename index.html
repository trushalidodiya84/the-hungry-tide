<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>The Hungry Tide - Literary Cartography</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
    height:95vh;
}
</style>

</head>
<body>

<h3>The Hungry Tide – Literary Cartography</h3>

<div id="map"></div>

<script>

/* ================= BASE MAP ================= */

var map = L.map('map').setView([22.0,89.0],6);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
 attribution:'© OpenStreetMap © CARTO'
}
).addTo(map);
    
/* ================= MAIN THEMATIC LAYERS ================= */

var ecologyLayer = L.layerGroup().addTo(map);

var migrationLayer = L.layerGroup().addTo(map);

var memoryLayer = L.layerGroup().addTo(map);
/* ================= ECOLOGY SUBLAYERS ================= */

var dolphinLayer = L.layerGroup();

    /* Coastal Irrawaddy Dolphin Distribution */

L.polygon([
    [20.0, 80.0],
    [22.0, 95.0],
    [18.0, 115.0],
    [10.0, 135.0],
    [-15.0, 140.0],
    [-10.0, 105.0],
    [5.0, 85.0]
],{
    color:"#1f78b4",
    fillColor:"#7fcdbb",
    fillOpacity:0.25,
    weight:2
}).addTo(dolphinLayer)
.bindPopup(
"<b>🐬 Coastal Irrawaddy Dolphin Distribution</b><br>" +
"Coastal populations of <i>Orcaella brevirostris</i> occur across the waters of South and Southeast Asia and extend to Northern Australia."
);

/* ================= DOLPHIN RIVER NETWORKS ================= */

var riverFiles = [

[
"Ganga.geojson",
"🐬 Ganga River",
"The Ganga river system historically supported populations of the Shushuk (river dolphin)."
],

[
"Indus.geojson",
"🐬 Indus River",
"The Sindhu (Indus) river system was historically associated with river dolphin populations."
],

[
"Irrawaddy.geojson",
"🐬 Irrawaddy River",
"One of the principal freshwater habitats of the Irrawaddy dolphin in Southeast Asia."
],

[
"Mekong.geojson",
"🐬 Mekong River",
"A major refuge for the remaining freshwater populations of the Irrawaddy dolphin."
],

[
"Brahmaputra.geojson",
"🐬 Brahmaputra River",
"Part of the larger riverine ecological network connected to South Asian freshwater dolphin habitats."
]

];

riverFiles.forEach(function(river){

fetch(river[0])
.then(response => response.json())
.then(data => {

L.geoJSON(data,{
style:{
color:"#1f78b4",
weight:2,
opacity:0.8
}
})
.bindPopup(
"<b>"+river[1]+"</b><br>" +
river[2]
)
.addTo(dolphinLayer);

});

});
 

var tigerLayer = L.layerGroup();

var mangroveLayer = L.layerGroup();

var tidalPoolLayer = L.layerGroup();

var ecologicalCorridorLayer = L.layerGroup();

var stormLayer = L.layerGroup();

/* Attach to Ecology */

ecologyLayer.addLayer(dolphinLayer);

ecologyLayer.addLayer(tigerLayer);

ecologyLayer.addLayer(mangroveLayer);
    /* ================= MANGROVE HABITAT ================= */

L.polygon([
    [22.35,88.55],
    [22.30,89.25],
    [22.10,89.60],
    [21.75,89.70],
    [21.50,89.45],
    [21.45,88.90],
    [21.65,88.55],
    [22.00,88.45]
],{
    color:"#228B22",
    fillColor:"#32CD32",
    fillOpacity:0.20,
    weight:2
})
.addTo(mangroveLayer)
.bindPopup(
"<b>🌿 Sundarbans Mangrove Ecosystem</b><br>" +
"The world's largest mangrove forest. A dynamic ecological zone shaped by tides, sedimentation, salinity, and biodiversity. The mangrove habitat forms the ecological foundation of Amitav Ghosh's <i>The Hungry Tide</i>."
);

ecologyLayer.addLayer(tidalPoolLayer);
    /* ================= TIDE COUNTRY ================= */

L.polygon([
    [22.40,88.60],
    [22.30,89.50],
    [21.90,89.80],
    [21.45,89.60],
    [21.35,88.80],
    [21.60,88.40]
],{
    color:"#0066cc",
    fillColor:"#66ccff",
    fillOpacity:0.15,
    weight:2,
    dashArray:"5,5"
})
.addTo(tidalPoolLayer)
.bindPopup(
"<b>🌊 Tide Country</b><br>" +
"A dynamic estuarine landscape shaped by daily tides, erosion, sedimentation, and shifting waterways. The tide country is the central ecological space of Amitav Ghosh's <i>The Hungry Tide</i>."
);

ecologyLayer.addLayer(ecologicalCorridorLayer);

ecologyLayer.addLayer(stormLayer);
    /* ================= LAYER CONTROL ================= */
/* ================= CANNING : ENVIRONMENTAL HISTORY ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Canning"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#8B4513",
                        fillColor:"#CD853F",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(
                        "<b>⛈️ Port Canning: Ecology versus Empire</b><br>" +
                        "A colonial port project established on the Matla River. " +
                        "Henry Piddington warned that the site was vulnerable to cyclones and tidal surges and emphasized the protective role of the Sundarbans mangroves. " +
                        "In 1867 a devastating cyclone struck the settlement and the port never recovered. " +
                        "The episode illustrates the conflict between colonial ambition and the ecological realities of the Sundarbans."
                    );

                }

            }).addTo(ecologyLayer);

        }

    });

});
    var riverFiles = [

["Malta River.geojson","🌊 Malta River","Ecological River"],

];
L.control.layers(
null,
{
    "🟢 Ecological Habitat Networks": ecologyLayer,

    "🔴 Migration & Mobility Networks": migrationLayer,

    "🔵 Spatial & Cultural Memory": memoryLayer
},
{
    collapsed:false
}
).addTo(map);
</script>

</body>
</html>
