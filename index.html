<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>The Hungry Tide - Literary Cartography</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
    height:95vh;
}
</style>

</head>
<body>

<h3>The Hungry Tide – Literary Cartography</h3>

<div id="map"></div>

<script>

/* ================= BASE MAP ================= */

var map = L.map('map').setView([22.0,89.0],6);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
 attribution:'© OpenStreetMap © CARTO'
}
).addTo(map);
    
/* ================= MAIN THEMATIC LAYERS ================= */

var ecologyLayer = L.layerGroup().addTo(map);

var migrationLayer = L.layerGroup().addTo(map);

var memoryLayer = L.layerGroup().addTo(map);
/* ================= ECOLOGY SUBLAYERS ================= */

var dolphinLayer = L.layerGroup();

    /* Coastal Irrawaddy Dolphin Distribution */

L.polygon([
    [20.0, 80.0],
    [22.0, 95.0],
    [18.0, 115.0],
    [10.0, 135.0],
    [-15.0, 140.0],
    [-10.0, 105.0],
    [5.0, 85.0]
],{
    color:"#1f78b4",
    fillColor:"#7fcdbb",
    fillOpacity:0.25,
    weight:2
}).addTo(dolphinLayer)
.bindPopup(
"<b>🐬 Coastal Irrawaddy Dolphin Distribution</b><br>" +
"Coastal populations of <i>Orcaella brevirostris</i> occur across the waters of South and Southeast Asia and extend to Northern Australia."
);

/* 🐬 Shushuk: Symbolic Connection of the Sindhu and Ganga */

L.polyline([
    [28.0, 70.0],   // Indus Basin (Sindhu)
    [25.5, 82.0],   // Ganga Basin
],{
    color:"#3182bd",
    weight:3,
    dashArray:"8,6",
    opacity:0.8
}).addTo(dolphinLayer)
.bindPopup(
"<b>🐬 Shushuk: The Dolphin Connection</b><br>" +
"In Nirmal's ecological imagination, the Sindhu and the Ganga were once cojoined through the Shushuk (river dolphin), symbolizing a shared aquatic ecology across river systems."
);

/* River Nodes */

L.circleMarker([28.0,70.0],{
    radius:8,
    color:"#08519c",
    fillColor:"#6baed6",
    fillOpacity:0.9
}).addTo(dolphinLayer)
.bindPopup("<b>🐬 Sindhu (Indus River)</b>");

L.circleMarker([25.5,82.0],{
    radius:8,
    color:"#08519c",
    fillColor:"#6baed6",
    fillOpacity:0.9
}).addTo(dolphinLayer)
.bindPopup("<b>🐬 Ganga River</b>");
    
var tigerLayer = L.layerGroup();

var mangroveLayer = L.layerGroup();

var tidalPoolLayer = L.layerGroup();

var ecologicalCorridorLayer = L.layerGroup();

var stormLayer = L.layerGroup();

/* Attach to Ecology */

ecologyLayer.addLayer(dolphinLayer);

ecologyLayer.addLayer(tigerLayer);

ecologyLayer.addLayer(mangroveLayer);

ecologyLayer.addLayer(tidalPoolLayer);

ecologyLayer.addLayer(ecologicalCorridorLayer);

ecologyLayer.addLayer(stormLayer);
    /* ================= LAYER CONTROL ================= */

L.control.layers(
null,
{
    "🟢 Ecological Habitat Networks": ecologyLayer,

    "🔴 Migration & Mobility Networks": migrationLayer,

    "🔵 Spatial & Cultural Memory": memoryLayer
},
{
    collapsed:false
}
).addTo(map);
</script>

</body>
</html>
