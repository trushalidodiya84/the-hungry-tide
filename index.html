<body>

<div id="sidebar">

<h1>THE HUNGRY TIDE</h1>

<p class="subtitle"><em>An Interactive Literary Map</em></p>

<p class="project">A Digital Humanities Project</p>

<a href="#" id="aboutLink">About this Project</a>

</div>

<div id="map"></div>

<script>

// ================= MAP =================

var map = L.map('map').setView([22.05, 88.90], 9);

    /* ================= BASE MAPS ================= */

var standard = L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap © CARTO'
}).addTo(map);

var waterways = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
{
    attribution: 'Tiles © Esri'
});

var forest = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    attribution: 'Tiles © Esri'
});

var baseMaps = {
    "🗺 Standard Map": standard,
    "🌊 Waterways": waterways,
    "🌿 Forest & Terrain": forest
};
    
/* ================= MAIN THEMATIC LAYERS ================= */

var ecologyLayer = L.layerGroup().addTo(map);

var migrationLayer = L.layerGroup().addTo(map);

var memoryLayer = L.layerGroup().addTo(map);

var mythLayer = L.layerGroup().addTo(map);  
    
var dolphinLayer = L.layerGroup();

    /* Coastal Irrawaddy Dolphin Distribution */

/* ================= COASTAL IRRAWADDY DOLPHIN HABITAT ================= */

fetch("Costal Dolphin Zone.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {


    style: {
        color: "#2E7D32",
        fillColor: "#66BB6A",
        fillOpacity: 0.25,
        weight: 2
    },


        onEachFeature: function(feature, layer) {

            layer.bindPopup(`
                <b>🐬 Coastal Irrawaddy Dolphin Habitat Zone</b><br><br>

                This polygon represents the approximate coastal distribution of the Irrawaddy Dolphin (<i>Orcaella brevirostris</i>) across South and Southeast Asia.

                <br><br>

                The habitat extends from the eastern coast of India through Myanmar, Thailand, Cambodia, Vietnam, Malaysia, Indonesia, the Philippines, and northern Australia.

                <br><br>

                Piya expects to encounter the coastal population of Irrawaddy dolphins in the saline waters of the Sundarbans. Her observations reveal remarkable adaptations of the species to the region's unique tidal ecology.


            `);

        }

    }).addTo(dolphinLayer);

});
/* ================= DOLPHIN RIVER NETWORKS ================= */

var riverFiles = [

[
"Ganga.geojson",
"🐬 Ganga River",
"The Ganga river system historically supported populations of the Shushuk (river dolphin)."
],

[
"Indus.geojson",
"🐬 Indus River",
"The Sindhu (Indus) river system was historically associated with river dolphin populations."
],

[
"Irrawaddy.geojson",
"🐬 Irrawaddy River",
"The Irrawaddy River in Myanmar is one of the primary freshwater habitats of the Irrawaddy dolphin (Orcaella brevirostris). During her earlier field research, Piya observed flood tides creating numerous shallow creeks and pools where the dolphins skillfully hunted fish. These observations formed the basis of her scientific understanding of the species before she began her expedition in the Sundarbans."
],
    
[
"Mekong.geojson",
"🐬 Mekong River",
"A major refuge for the remaining freshwater populations of the Irrawaddy dolphin."
],

[
"Brahmaputra.geojson",
"🐬 Brahmaputra River",
"Part of the larger riverine ecological network connected to South Asian freshwater dolphin habitats."
]

];

riverFiles.forEach(function(river){

fetch(river[0])
.then(response => response.json())
.then(data => {

L.geoJSON(data, {
    style: {
        color: "#2E7D32",
        weight: 2,
        opacity: 0.8
    }
})
.bindPopup(
"<b>"+river[1]+"</b><br>" +
river[2]
)
.addTo(dolphinLayer);

});

});
 

var tigerLayer = L.layerGroup();

var mangroveLayer = L.layerGroup();

var tidalPoolLayer = L.layerGroup();

var ecologicalCorridorLayer = L.layerGroup();

var stormLayer = L.layerGroup();

/* Attach to Ecology */

ecologyLayer.addLayer(dolphinLayer);

ecologyLayer.addLayer(tigerLayer);

ecologyLayer.addLayer(mangroveLayer);
   
    /* ================= TIDE COUNTRY ================= */

L.polygon([
    [22.40,88.60],
    [22.30,89.50],
    [21.90,89.80],
    [21.45,89.60],
    [21.35,88.80],
    [21.60,88.40]
],{
    color:"#2E7D32",
fillColor:"#66BB6A",
    fillOpacity:0.15,
    weight:2,
    dashArray:"5,5"
})
.addTo(tidalPoolLayer)
.bindPopup(`
<b>🌊 Tide Country</b><br><br>

The Tide Country represents one of the world's most dynamic estuarine landscapes, where rivers, islands, forests, and coastlines exist in a constant state of transformation.<br><br>

<b>Ecological Characteristics</b><br>
• Rivers frequently change their courses, while islands emerge and disappear within a short span of time.<br>
• Mangrove forests regenerate rapidly, reclaiming denuded land within a few decades.<br>
• Tides continuously reshape the landscape, eroding, depositing, and transforming everything into new forms of life.<br><br>

<b>Literary Significance</b><br>
In <i>The Hungry Tide</i>, the Tide Country symbolizes a landscape of perpetual change where human lives, memory, and ecology remain inseparable. As Rainer Maria Rilke observes, <i>"Life is lived in transformation,"</i> a philosophy that aptly reflects the ever-changing ecology of the Sundarbans.
`);
    


    /* ================= MANGROVE HABITAT ================= */

L.polygon([
    [22.35,88.55],
    [22.30,89.25],
    [22.10,89.60],
    [21.75,89.70],
    [21.50,89.45],
    [21.45,88.90],
    [21.65,88.55],
    [22.00,88.45]
],{
    color:"#2E7D32",
fillColor:"#66BB6A",
    fillOpacity:0.20,
    weight:2
})
.addTo(mangroveLayer)
.bindPopup(
"<b>🌿 Sundarbans Mangrove Ecosystem</b><br>" +
"The world's largest mangrove forest. A dynamic ecological zone shaped by tides, sedimentation, salinity, and biodiversity. The mangrove habitat forms the ecological foundation of Amitav Ghosh's <i>The Hungry Tide</i>."
);

ecologyLayer.addLayer(tidalPoolLayer);


    /* ================= LAYER CONTROL ================= */
/* ================= CANNING : ENVIRONMENTAL HISTORY ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Canning"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                       radius: 8,
                       color: "#2E7D32",
                       fillColor: "#66BB6A",
                       fillOpacity: 0.8,
                       weight: 2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(
                        "<b>⛈️ Port Canning: Ecology versus Empire</b><br>" +
                        "A colonial port project established on the Matla River. " +
                        "Henry Piddington warned that the site was vulnerable to cyclones and tidal surges and emphasized the protective role of the Sundarbans mangroves. " +
                        "In 1867 a devastating cyclone struck the settlement and the port never recovered. " +
                        "The episode illustrates the conflict between colonial ambition and the ecological realities of the Sundarbans."
                    );

                }

            }).addTo(ecologyLayer);

        }

    });

});
    /* ================= ASSAM : ECOLOGY ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Assam"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#006400",
                        fillColor:"#32CD32",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(`
                    <b>🌿 Assam</b><br><br>

                    Assam is associated with the Brahmaputra River, one of South Asia's major river systems and an important habitat for freshwater biodiversity, including the Gangetic River Dolphin.

                    <br><br>

                    In <i>The Hungry Tide</i>, Piya's mother is from Assam and lived near the banks of the Brahmaputra, linking Piya's family history to the riverine ecologies of South Asia.
                    `);

                }

            }).addTo(ecologyLayer);

        }

    });

});
/* ================= MORICHHJHAPI : ECOLOGY ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Morichjhapi"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#006400",
                        fillColor:"#32CD32",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(`
<b>🌿 Morichjhapi</b><br><br>

Located near Lusibari on the banks of the Bagna River, Morichjhapi was a forested island within the Sundarbans Reserved Forest. The island became the site of a major conflict between human settlement and environmental conservation.

<br><br>

In 1979, thousands of refugees displaced from East Pakistan/Bangladesh and later resettled in Dandakaranya migrated to Morichjhapi in search of land and livelihood. However, the authorities declared the island a protected forest reserved for tiger conservation and ordered the settlers' eviction.

<br><br>

Morichjhapi highlights the complex relationship between ecology, conservation policies, human survival, and the fragile mangrove environment of the Sundarbans. In <i>The Hungry Tide</i>, it serves as a powerful example of how environmental space is shaped by both natural forces and political decisions.
`);

                }

            }).addTo(ecologyLayer);

        }

    });

});

    /* ================= MORICHHJHAPI : MIGRATION ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Morichjhapi"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#8B0000",
                        fillColor:"#FF4444",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(`
<b>🚶 Morichjhapi</b><br><br>

In 1979, thousands of refugees displaced by Partition and later confined to government resettlement camps in Dandakaranya migrated to Morichjhapi in the hope of rebuilding their lives in Bengal.

<br><br>

The island became a symbol of displacement, migration, exile, and the search for homeland. The settlers attempted to create a self-sustaining community, dividing the island into zones and cultivating the land.

<br><br>

Morichjhapi represents one of the most significant migration narratives in <i>The Hungry Tide</i>, linking Partition, refugee movements, and the struggle for belonging.
`);

                }

            }).addTo(migrationLayer);

        }

    });

});
    /* ================= MORICHHJHAPI : MEMORY ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Morichjhapi"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#00008B",
                        fillColor:"#4169E1",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(`
<b>📖 Morichjhapi</b><br><br>

Morichjhapi is a site of historical and cultural memory in <i>The Hungry Tide</i>. Through Nirmal's journals, Kusum's experiences, and the recollections of local inhabitants, the island preserves memories of displacement, suffering, resistance, and loss.

<br><br>

Nirmal believed that the events at Morichjhapi should leave 'some trace, some hold upon the memory of the world.' His writings transform the island into a memorial landscape where personal stories intersect with larger histories of Partition and state violence.

<br><br>

Morichjhapi stands as a powerful reminder of forgotten histories within the Sundarbans.
`);

                }

            }).addTo(memoryLayer);

        }

    });


    });

    /* ================= MALTA RIVER ================= */

fetch("Malta River.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        style:{
            color:"#1976d2",
            weight:3,
            opacity:0.85
        }
    })
    .bindPopup(
        "<b>Malta River</b><br>" +
        "Ecological River"
    )
    .addTo(ecologyLayer);

});

/* ================= GARJANTOLA ================= */

fetch("Garjantola.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {

        pointToLayer: function(feature, latlng){
            return L.circleMarker(latlng,{
                radius:10,
                color:"#006400",
                fillColor:"#32CD32",
                fillOpacity:0.8,
                weight:2
            });
        },

        onEachFeature: function(feature, layer){

           layer.bindPopup(`
             <b>🌿 Garjantola</b><br><br>

             An ecologically significant site in the Sundarbans associated with tidal pools, dolphin habitat, and Bon Bibi traditions. In <i>The Hungry Tide</i>, Garjantola serves as an important field site for Piya's dolphin research and reflects local ecological knowledge.

              <br><br>

           According to local memory narrated in the novel, Kusum's father survived a tiger attack in this region. In gratitude for his survival, he built a shrine dedicated to Bon Bibi, the protective guardian of the Sundarbans. The shrine became an important symbol of faith and coexistence between humans and the dangerous wilderness.

            <br><br>

        <b>Possible Origins of the Name:</b>

              <ul>
             <li><b>Garjan Tree (<i>Rhizophora apiculata</i>):</b> The name may derive from the Garjan mangrove tree, a species adapted to the tidal forests of the Sundarbans. These trees help stabilize riverbanks, protect embankments from tidal surges, and support the region's biodiversity.</li>

              <li><b>Garjan (Roar):</b> The name may also refer to the roar of tigers, reflecting the area's proximity to wilderness associated with Dokkhin Rai, the tiger deity of Sundarbans folklore.</li>
                </ul>

                Garjantola thus represents a convergence of mangrove ecology, dolphin habitat, tiger territory, mythology, and cultural memory within the tide country.
             `);

        }

    }).addTo(ecologyLayer);

});

   
    /* ================= PIYA FAMILY MIGRATION ================= */

    var piyaFamilyMigration = L.polyline([
    [21.24210346970345, 96.43350227643321],   // Burma
    [22.55819943765848, 88.28923271685082],   // Kolkata
    [47.60594060998454, -122.33119513137272]  // Seattle
],{
    color:"#FF4444",
    weight:3,
    dashArray:"8,8"
});
    piyaFamilyMigration.bindPopup(`
<b>🚶 Piya's Family Migration Route</b><br><br>

Burma (Myanmar) → Calcutta (India) → Seattle (USA)

<br><br>

Piya's grandparents were Bengali settlers in Burma. During the upheavals of the Second World War, the family migrated to India as refugees and later settled in the United States.

<br><br>

This route illustrates a transnational history of displacement and migration that connects South Asia to the global Bengali diaspora. Piya's later return to the Sundarbans represents a symbolic reconnection with the landscapes and histories from which her family had once been displaced.
`);
    migrationLayer.addLayer(piyaFamilyMigration);


fetch("dandakaranya.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{

        style:{
            color:"#8B4513",
            weight:2,
            fillOpacity:0.3
        },

        onEachFeature:function(feature,layer){

            layer.bindPopup(`
<b>🚶 Dandakaranya Resettlement Region</b><br><br>

The Dandakaranya Project was established by the Indian government to resettle refugees displaced from East Pakistan (later Bangladesh) after Partition.

<br><br>

Thousands of refugee families were relocated to camps in Central India, hundreds of kilometres away from Bengal. Although the government described the scheme as rehabilitation, many settlers felt culturally isolated and disconnected from their homeland.

<br><br>

Several refugees viewed the camps as restrictive spaces where movement was closely monitored. Many believed that they had little freedom to leave and rebuild their lives elsewhere.

<br><br>

By 1979, growing dissatisfaction led thousands of refugees to leave Dandakaranya collectively. Hoping to return to Bengal and establish a permanent settlement, they migrated to the Sundarbans and occupied Morichjhapi Island.

<br><br>

Dandakaranya therefore represents a crucial stage in the migration history of the Morichjhapi settlers, linking displacement, state resettlement policies, and the search for belonging.
`);
        }

    }).addTo(migrationLayer);

});
/* ================= BANGLADESH : MIGRATION ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Bangladesh"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#8B0000",
                        fillColor:"#FF6B6B",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

layer.bindPopup(`
<b>🚶 Bangladesh Partition Migration Network</b><br><br>

The Partition of British India in 1947 profoundly shaped the lives of many characters in <i>The Hungry Tide</i>. Nirmal, originally from Dhaka, arrived in Calcutta as a student before Partition. The creation of the international border separated him from his family, forcing him to remain in India and begin a new life in Calcutta.

<br><br>

As a lecturer at Ashutosh College, Nirmal met Nilima, one of his students, whom he later married. Their lives, however, continued to be influenced by the political upheavals of post-Independence South Asia. Nirmal's involvement with left-wing political movements and his association with anti-colonial struggles in Burma eventually led to his detention and later his relocation to Lusibari in the Sundarbans.

<br><br>

The migration of refugees from East Pakistan into India transformed the social and cultural landscape of the Sundarbans. Their search for land, livelihood, and belonging eventually culminated in the settlement at Morichjhapi, an event that occupies a central place in the novel's historical memory.

<br><br>

Through Nirmal's personal journey, Amitav Ghosh illustrates how political borders, displacement, and migration reshape individual lives while leaving enduring traces in the collective memory of the Sundarbans.

`);
                }

            }).addTo(migrationLayer);

        }

    });

});    

 /* ================= PARTITION MIGRATION NETWORK ================= */

fetch("Bangladesh Partition Migration Network.geojson")
.then(response => response.json())
.then(data => {

    var partitionMigration = L.geoJSON(data, {

        style: function(feature) {
            return {
                color: "#B22222",      // Dark Red
                weight: 3,
                opacity: 0.9,
                dashArray: "1,7",      // Small dotted pattern
                lineCap: "round",
                lineJoin: "round"
            };
        },

        onEachFeature: function(feature, layer) {

            layer.bindPopup(`
                <b>🚶 Bangladesh Partition Migration Network</b><br><br>

                The Partition of British India (1947) and the subsequent political upheavals in East Pakistan (present-day Bangladesh) resulted in one of the largest episodes of forced migration in modern South Asian history. Millions of displaced people crossed the international border into India in search of safety, livelihood, and resettlement.

                <br><br>

                This symbolic migration network illustrates the broad movement of refugees across the border rather than specific migration routes. It provides the historical context that informs the refugee narratives and cultural memory represented in <i>The Hungry Tide</i>.

            `);

        }

    });

    partitionMigration.addTo(migrationLayer);

});
    
    /* ================= RAIPUR : CENTRAL REFUGEE CAMP ================= */

fetch("All places.geojson")
.then(response => response.json())
.then(data => {

    data.features.forEach(function(feature){

        if(feature.properties.name === "Raipur"){

            L.geoJSON(feature,{

                pointToLayer: function(feature, latlng){
                    return L.circleMarker(latlng,{
                        radius:8,
                        color:"#8B0000",
                        fillColor:"#FF4444",
                        fillOpacity:0.8,
                        weight:2
                    });
                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(`
<b>🚶 Raipur Refugee Camp</b><br><br>

Raipur served as an important administrative centre within the Dandakaranya rehabilitation scheme established for refugees displaced from East Pakistan (later Bangladesh).

<br><br>

<br><br>

For many refugees, the journey to Raipur marked a second displacement. Removed from Bengal's familiar language, culture, rivers, and agricultural environment, they faced difficult living conditions and an uncertain future.

<br><br>

In <i>The Hungry Tide</i>, the history of refugee migration to Morichjhapi is closely connected to the larger Dandakaranya resettlement programme. Raipur therefore represents an important stage in the migration route from Bangladesh to Dandakaranya and eventually to Morichjhapi.
`);
                }

            }).addTo(migrationLayer);

        }

    });

});

    /* ================= SATJELIA : MEMORY ================= */

fetch("All places.geojson")
.then(response => response.json())
