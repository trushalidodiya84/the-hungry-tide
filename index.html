<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>The Hungry Tide - Literary Cartography</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{
    height:95vh;
}
</style>

</head>
<body>

<h3>The Hungry Tide – Literary Cartography</h3>

<div id="map"></div>

<script>

/* ================= BASE MAP ================= */

var map = L.map('map').setView([22.0,89.0],6);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
{
 attribution:'© OpenStreetMap © CARTO'
}
).addTo(map);
    
/* ================= MAIN THEMATIC LAYERS ================= */

var ecologyLayer = L.layerGroup().addTo(map);

var migrationLayer = L.layerGroup().addTo(map);

var memoryLayer = L.layerGroup().addTo(map);
/* ================= ECOLOGY SUBLAYERS ================= */

var dolphinLayer = L.layerGroup();
    /* ================= IRRAWADDY DOLPHIN HABITAT DISTRIBUTION ================= */

/* Coastal Distribution Zone */

L.polygon([
    [22.8,87.8],
    [22.6,89.5],
    [21.8,90.2],
    [20.8,90.0],
    [20.6,88.2],
    [21.5,87.5]
],{
    color:"#1f78b4",
    fillColor:"#7fcdbb",
    fillOpacity:0.30,
    weight:2
}).addTo(dolphinLayer)
.bindPopup(
"<b>Coastal Irrawaddy Dolphin Habitat</b><br>" +
"Coastal populations inhabit saline estuarine and near-shore waters. " +
"They range widely along coastlines and may remain in favourable areas for extended periods before shifting to other estuarine zones."
);

/* Deep-Water Habitat Nodes */

var habitatNodes = [

{
name:"Deep-Water Refuge Pool A",
coord:[22.05,89.10]
},

{
name:"Deep-Water Refuge Pool B",
coord:[21.85,89.28]
},

{
name:"Deep-Water Refuge Pool C",
coord:[21.70,89.42]
}

];

habitatNodes.forEach(function(site){

L.circleMarker(site.coord,{
    radius:8,
    color:"#08519c",
    fillColor:"#6baed6",
    fillOpacity:0.9,
    weight:2
})
.addTo(dolphinLayer)
.bindPopup(
"<b>"+site.name+"</b><br>" +
"Representative deep-water refuge habitat. During dry periods, riverine Irrawaddy dolphins return to deep pools created by riverbed geology and hydrological conditions."
);

});

/* Ecological Connectivity */

L.polyline([
    [22.05,89.10],
    [21.85,89.28],
    [21.70,89.42]
],{
    color:"#3182bd",
    weight:3,
    dashArray:"8,6",
    opacity:0.8
})
.addTo(dolphinLayer)
.bindPopup(
"<b>Habitat Connectivity Network</b><br>" +
"Riverine populations move between deep-water refuges, tributaries and floodplain habitats in response to seasonal hydrological changes."
);

var tigerLayer = L.layerGroup();

var mangroveLayer = L.layerGroup();

var tidalPoolLayer = L.layerGroup();

var ecologicalCorridorLayer = L.layerGroup();

var stormLayer = L.layerGroup();

/* Attach to Ecology */

ecologyLayer.addLayer(dolphinLayer);

ecologyLayer.addLayer(tigerLayer);

ecologyLayer.addLayer(mangroveLayer);

ecologyLayer.addLayer(tidalPoolLayer);

ecologyLayer.addLayer(ecologicalCorridorLayer);

ecologyLayer.addLayer(stormLayer);
    /* ================= LAYER CONTROL ================= */

L.control.layers(
null,
{
    "🟢 Ecological Habitat Networks": ecologyLayer,

    "🔴 Migration & Mobility Networks": migrationLayer,

    "🔵 Spatial & Cultural Memory": memoryLayer
},
{
    collapsed:false
}
).addTo(map);
</script>

</body>
</html>
